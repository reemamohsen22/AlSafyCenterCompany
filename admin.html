<!-- admin.html -->
<script>
const API = "https://api.yourstore.com";
const TOKEN = localStorage.getItem("admin_token");

// Login check
if (!TOKEN) {
  const entered = prompt("Enter admin password:");
  // hash check or just compare to a known token
  localStorage.setItem("admin_token", entered);
  location.reload();
}

async function apiCall(method, path, body) {
  return fetch(API + path, {
    method,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${TOKEN}`
    },
    body: body ? JSON.stringify(body) : undefined
  });
}

// Load products
async function loadProducts() {
  const res = await fetch(`${API}/products`);
  const products = await res.json();
  // render table with Edit / Delete buttons
}

// Create / Update
async function saveProduct(product) {
  const method = product.id ? "PUT" : "POST";
  const path = product.id ? `/products/${product.id}` : "/products";
  await apiCall(method, path, product);
  loadProducts();
}

// Delete
async function deleteProduct(id) {
  await apiCall("DELETE", `/products/${id}`);
  loadProducts();
}
</script>
